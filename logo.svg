<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- House outline -->
  <g transform="translate(150, 90)">
    <!-- Roof -->
    <path d="M-60 0 L0 -55 L60 0" fill="none" stroke="#C8A96E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Body -->
    <rect x="-45" y="0" width="90" height="65" fill="none" stroke="#F5F0E1" stroke-width="4" rx="3"/>
    <!-- Door -->
    <rect x="-12" y="25" width="24" height="40" fill="none" stroke="#C8A96E" stroke-width="3" rx="12"/>
    <!-- Door knob -->
    <circle cx="6" cy="48" r="3" fill="#C8A96E"/>
    <!-- Window left -->
    <rect x="-36" y="12" width="18" height="16" fill="none" stroke="#F5F0E1" stroke-width="2.5" rx="2"/>
    <!-- Window right -->
    <rect x="18" y="12" width="18" height="16" fill="none" stroke="#F5F0E1" stroke-width="2.5" rx="2"/>
  </g>

  <!-- THE HANDY -->
  <text x="150" y="195" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" fill="#C8A96E" letter-spacing="8">THE HANDY</text>

  <!-- NEIGHBOR CO. -->
  <text x="150" y="228" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="900" fill="#F5F0E1" letter-spacing="2">NEIGHBOR CO.</text>

  <!-- Accent line -->
  <line x1="90" y1="242" x2="210" y2="242" stroke="#C8A96E" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="150" y="265" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="500" fill="rgba(245,240,225,0.6)" letter-spacing="4">RELIABLE &amp; READY</text>
</svg>