<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&amp;display=swap');
      .badge-dark { fill: #2C2C2C; }
      .badge-light { fill: #F5F0E1; }
      .text-dark { fill: #2C2C2C; font-family: 'Playfair Display', 'Georgia', serif; }
      .text-light { fill: #F5F0E1; font-family: 'Playfair Display', 'Georgia', serif; }
    </style>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="grainBlend"/>
      <feComponentTransfer in="grainBlend">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Main badge shape - hexagonal with pointed top -->
  <g filter="url(#grain)">
    <!-- Outer badge outline -->
    <path d="
      M 200 8
      L 365 95
      L 365 325
      L 200 412
      L 35 325
      L 35 95
      Z
    " fill="#2C2C2C" stroke="#F5F0E1" stroke-width="5"/>

    <!-- Inner badge outline -->
    <path d="
      M 200 18
      L 355 100
      L 355 320
      L 200 402
      L 45 320
      L 45 100
      Z
    " fill="none" stroke="#F5F0E1" stroke-width="1.5" opacity="0.4"/>

    <!-- House/roof shape at top -->
    <path d="
      M 200 28
      L 310 85
      L 310 130
      L 90 130
      L 90 85
      Z
    " fill="#2C2C2C" stroke="#F5F0E1" stroke-width="3"/>

    <!-- Roof peak lines -->
    <line x1="200" y1="42" x2="145" y2="90" stroke="#F5F0E1" stroke-width="2.5"/>
    <line x1="200" y1="42" x2="255" y2="90" stroke="#F5F0E1" stroke-width="2.5"/>
    <!-- Horizontal eave line -->
    <line x1="135" y1="95" x2="265" y2="95" stroke="#F5F0E1" stroke-width="2"/>

    <!-- Window on the house -->
    <rect x="188" y="58" width="24" height="28" fill="#F5F0E1" rx="1"/>
    <line x1="200" y1="58" x2="200" y2="86" stroke="#2C2C2C" stroke-width="2"/>
    <line x1="188" y1="72" x2="212" y2="72" stroke="#2C2C2C" stroke-width="2"/>

    <!-- Cream banner across middle -->
    <path d="
      M 55 140
      L 345 140
      L 355 170
      L 345 200
      L 55 200
      L 45 170
      Z
    " fill="#F5F0E1"/>

    <!-- THE HANDY text on banner -->
    <text x="200" y="180" text-anchor="middle" class="text-dark" font-size="32" font-weight="700" letter-spacing="6">THE HANDY</text>

    <!-- Decorative lines on banner sides -->
    <line x1="75" y1="155" x2="120" y2="155" stroke="#2C2C2C" stroke-width="1.5"/>
    <line x1="75" y1="159" x2="120" y2="159" stroke="#2C2C2C" stroke-width="1"/>
    <line x1="280" y1="155" x2="325" y2="155" stroke="#2C2C2C" stroke-width="1.5"/>
    <line x1="280" y1="159" x2="325" y2="159" stroke="#2C2C2C" stroke-width="1"/>
    <line x1="75" y1="185" x2="120" y2="185" stroke="#2C2C2C" stroke-width="1.5"/>
    <line x1="75" y1="189" x2="120" y2="189" stroke="#2C2C2C" stroke-width="1"/>
    <line x1="280" y1="185" x2="325" y2="185" stroke="#2C2C2C" stroke-width="1.5"/>
    <line x1="280" y1="189" x2="325" y2="189" stroke="#2C2C2C" stroke-width="1"/>

    <!-- NEIGHBOR CO. large text -->
    <text x="200" y="252" text-anchor="middle" class="text-light" font-size="48" font-weight="900" letter-spacing="3">NEIGHBOR CO.</text>

    <!-- Crossed tools -->
    <g transform="translate(200, 310) scale(0.9)">
      <!-- Hammer (angled left) -->
      <g transform="rotate(-35)">
        <!-- Handle -->
        <rect x="-5" y="-50" width="10" height="80" rx="3" fill="#F5F0E1"/>
        <!-- Head -->
        <rect x="-18" y="-65" width="36" height="18" rx="3" fill="#F5F0E1"/>
        <!-- Claw notch -->
        <path d="M -18 -60 L -25 -72 L -18 -68" stroke="#F5F0E1" stroke-width="3" fill="none"/>
        <!-- Grip lines -->
        <line x1="-3" y1="10" x2="3" y2="10" stroke="#2C2C2C" stroke-width="1"/>
        <line x1="-3" y1="16" x2="3" y2="16" stroke="#2C2C2C" stroke-width="1"/>
        <line x1="-3" y1="22" x2="3" y2="22" stroke="#2C2C2C" stroke-width="1"/>
      </g>
      <!-- Wrench (angled right) -->
      <g transform="rotate(35)">
        <!-- Handle -->
        <rect x="-5" y="-45" width="10" height="80" rx="3" fill="#F5F0E1"/>
        <!-- Wrench head -->
        <path d="M -16 -55 L -16 -72 L -8 -62 L -5 -62 L -5 -45 L 5 -45 L 5 -62 L 8 -62 L 16 -72 L 16 -55 L 5 -45 L -5 -45 Z" fill="#F5F0E1"/>
        <!-- Grip lines -->
        <line x1="-3" y1="10" x2="3" y2="10" stroke="#2C2C2C" stroke-width="1"/>
        <line x1="-3" y1="16" x2="3" y2="16" stroke="#2C2C2C" stroke-width="1"/>
        <line x1="-3" y1="22" x2="3" y2="22" stroke="#2C2C2C" stroke-width="1"/>
      </g>
    </g>

    <!-- Decorative lines flanking tools -->
    <line x1="80" y1="290" x2="145" y2="290" stroke="#F5F0E1" stroke-width="2"/>
    <line x1="80" y1="295" x2="140" y2="295" stroke="#F5F0E1" stroke-width="1"/>
    <line x1="255" y1="290" x2="320" y2="290" stroke="#F5F0E1" stroke-width="2"/>
    <line x1="260" y1="295" x2="320" y2="295" stroke="#F5F0E1" stroke-width="1"/>

    <!-- RELIABLE & READY tagline -->
    <text x="200" y="375" text-anchor="middle" class="text-light" font-size="20" font-weight="700" letter-spacing="4">RELIABLE &amp; READY</text>

    <!-- Bullet dots around tagline -->
    <circle cx="108" cy="370" r="4" fill="#F5F0E1"/>
    <circle cx="292" cy="370" r="4" fill="#F5F0E1"/>
  </g>
</svg>